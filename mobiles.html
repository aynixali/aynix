<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobiles</title>
<link rel="icon" type="image/png" href="aynix.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== Base ===== */
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
body{
  font-family:'Roboto',sans-serif;
  background: #000002;
  color:#fff;
  overflow-x:hidden;
}

/* ===== ANIMATED GEMINI VIGNETTE CANVAS ===== */
#bg-layer {
  position: fixed;
  inset: 0;
  z-index: -1;
  background: radial-gradient(circle at center, #0a1626 0%, #000002 70%);
  animation: geminiPulse 10s ease-in-out infinite;
}

@keyframes geminiPulse {
  0% { background: radial-gradient(circle at center, #0a1626 0%, #000002 70%); }
  50% { background: radial-gradient(circle at center, #0f223d 0%, #000002 75%); }
  100% { background: radial-gradient(circle at center, #0a1626 0%, #000002 70%); }
}

/* ===== ULTRA-CLEAN GLASS NAV BAR ===== */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 20px 50px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0, 5, 10, 0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0, 255, 255, 0.15);
  box-shadow: 0 4px 30px rgba(0, 255, 255, 0.03);
  z-index: 100;
}

nav .brand {
  font-family: 'Orbitron', sans-serif;
  font-weight: 800;
  font-size: 1.5rem;
  color: #00ffff;
  text-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
  text-decoration: none;
  letter-spacing: 2px;
  transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
}

nav .brand:hover {
  text-shadow: 0 0 25px rgba(0, 255, 255, 1);
  letter-spacing: 4px;
}

nav .nav-links {
  display: flex;
  gap: 25px;
}

nav a.nav-item {
  color: #e0e0e0;
  text-decoration: none;
  font-weight: 500;
  font-size: 0.95rem;
  letter-spacing: 0.5px;
  position: relative;
  padding: 4px 0;
  transition: color 0.3s ease;
}

nav a.nav-item::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 2px;
  background: #00ffff;
  box-shadow: 0 0 8px #00ffff;
  transition: width 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
}

nav a.nav-item:hover {
  color: #00ffff;
}

nav a.nav-item:hover::after {
  width: 100%;
}

/* ===== HERO ===== */
.hero{
  height:85vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding: 0 20px;
  position: relative;
}
.hero h1{
  font-family:'Orbitron',sans-serif;
  font-size:4.5rem;
  font-weight: 800;
  color: #00ffff;
  text-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
  opacity:0;
  transform:translateY(40px);
  transition:1.2s ease;
}
.hero p{
  color:#ccc;
  font-size:1.2rem;
  margin-top:20px;
  opacity:0;
  transform:translateY(40px);
  transition:1.2s ease 0.3s;
  max-width:700px;
}

/* ===== Balanced Showcase Frame ===== */
.product-showcase {
  max-width: 750px;
  margin: 0 auto 100px auto;
  padding: 0 30px;
  text-align: center;
  opacity: 0;
  transform: translateY(40px);
  transition: 1.2s ease 0.5s;
}
.product-showcase img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 10px;
  filter: grayscale(100%) brightness(0.8);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
  transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
}
.product-showcase:hover img {
  filter: grayscale(0%) brightness(1);
  box-shadow: 0 30px 60px rgba(0, 255, 255, 0.15);
  transform: scale(1.02);
}

/* ===== Sections ===== */
section{
  min-height:70vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:80px 20px;
}
section h2{
  font-size:2.3rem;
  color:#fff;
  font-family:'Orbitron',sans-serif;
  margin-bottom:20px;
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}
section p{
  max-width:800px;
  color:#aaa;
  font-size:1.1rem;
  line-height:1.9;
  opacity:0;
  transform:translateY(40px);
  transition:1s ease 0.3s;
}
.signature{
  font-size:1.3rem;
  margin-top:40px;
  color:#fff;
  opacity:0;
  transform:translateY(40px);
  transition:1.5s ease 0.6s;
}

/* ===== SIMPLE CLEAN FOOTER ===== */
footer {
  position: relative;
  padding: 80px 40px 40px 40px;
  text-align: center;
  background: #000000;
  border-top: 1px solid rgba(255, 255, 255, 0.03);
  color: #9a9a9a;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 25px;
  z-index: 10;
}

.footer-text {
  font-size: 1rem;
  letter-spacing: 0.5px;
  color: #666;
}

.footer-text strong {
  color: #aaa;
  font-family: 'Orbitron', sans-serif;
}

.footer-mail {
  color: #e0e0e0;
  text-decoration: none;
  font-weight: 500;
  font-size: 1.1rem;
  letter-spacing: 0.5px;
  transition: color 0.3s ease;
}

.footer-mail:hover {
  color: #fff;
}

.instagram-link {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  color: #e0e0e0;
  text-decoration: none;
  font-weight: 500;
  font-size: 0.95rem;
  transition: color 0.3s ease;
}

.instagram-link:hover {
  color: #fff;
}

.instagram-link svg {
  transition: transform 0.4s ease;
}

.instagram-link:hover svg {
  transform: rotate(45deg);
}

.copyright {
  font-size: 0.8rem;
  color: #444;
  margin-top: 10px;
}

/* ===== Scroll Animation Active States ===== */
.fade-in{
  opacity:1!important;
  transform:translateY(0)!important;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  nav { padding: 15px 25px; }
  nav .brand { font-size: 1.3rem; }
  nav .nav-links { display: none; }
  .hero h1 { font-size: 3.2rem; }
  .hero p { font-size: 1rem; }
  .projects { flex-direction: column; align-items: center; }
  .product-showcase { margin-top: 0; padding:
